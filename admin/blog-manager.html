<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Management | GlobalEarn Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-red: #FF0000;
            --pure-green: #00FF00;
            --pure-blue: #0000FF;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; min-height: 100vh; padding: 40px; }

        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .header h1 span { color: var(--pure-blue); }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
        .stat-card h4 { font-size: 0.7rem; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card div { font-size: 1.5rem; font-weight: 800; }

        .table-wrap { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 20px; font-size: 0.75rem; color: #444; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; vertical-align: middle; }
        
        .blog-title { font-weight: 700; color: #fff; display: block; margin-bottom: 4px; }
        .blog-author { font-size: 0.75rem; color: #666; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .badge-pending { background: rgba(255, 165, 0, 0.1); color: orange; }
        .badge-approved { background: rgba(0, 255, 0, 0.1); color: var(--pure-green); }

        .actions { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; font-size: 0.75rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-approve { background: var(--pure-green); color: #000; }
        .btn-delete { background: rgba(255, 0, 0, 0.1); color: var(--pure-red); border: 1px solid var(--pure-red); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #loader { text-align: center; padding: 40px; color: #444; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>CONTENT_<span>MODERATION</span></h1>
            <a href="admin-dashboard.html" style="color: #666; text-decoration: none; font-size: 0.8rem;">← Back to Command Center</a>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <h4>Total Articles</h4>
                <div id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h4>Awaiting Review</h4>
                <div id="stat-pending" style="color: orange;">0</div>
            </div>
            <div class="stat-card">
                <h4>Active Published</h4>
                <div id="stat-approved" style="color: var(--pure-green);">0</div>
            </div>
        </div>

        <div class="table-wrap">
            <table id="blogTable">
                <thead>
                    <tr>
                        <th>Article Detail</th>
                        <th>Category</th>
                        <th>Reward (KSH)</th>
                        <th>Status</th>
                        <th>Management</th>
                    </tr>
                </thead>
                <tbody id="blogBody">
                    <tr><td colspan="5" id="loader">SYNCHRONIZING_DATABASE...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        async function fetchBlogs() {
            try {
                const res = await fetch('/api/blog/admin/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.error || 'Server protocol error');
                }

                const blogs = await res.json();
                const body = document.getElementById('blogBody');

                // Safety check: Ensure blogs is an array
                if (!Array.isArray(blogs) || blogs.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#444;">No blog posts found.</td></tr>';
                    return;
                }

                // Update Stats
                document.getElementById('stat-total').innerText = blogs.length;
                document.getElementById('stat-pending').innerText = blogs.filter(b => b.status === 'pending').length;
                document.getElementById('stat-approved').innerText = blogs.filter(b => b.status === 'approved').length;

                body.innerHTML = blogs.map(blog => `
                    <tr>
                        <td>
                            <span class="blog-title">${blog.title}</span>
                            <span class="blog-author">By: ${blog.author_name} (${blog.author_email})</span>
                        </td>
                        <td><span style="color:var(--pure-blue)">${blog.category}</span></td>
                        <td><b>${parseFloat(blog.reward).toFixed(2)}</b></td>
                        <td>
                            <span class="badge badge-${blog.status}">${blog.status}</span>
                        </td>
                        <td class="actions">
                            ${blog.status !== 'approved' ? 
                                `<button class="btn btn-approve" onclick="updateStatus(event, ${blog.id}, 'approve')">APPROVE</button>` : 
                                `<button class="btn" disabled style="background:#222; color:#555;">PUBLISHED</button>`
                            }
                            <button class="btn btn-delete" onclick="updateStatus(event, ${blog.id}, 'delete')">DELETE</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('blogBody').innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--pure-red);">FATAL_ERROR: ${err.message}</td></tr>`;
            }
        }

        async function updateStatus(e, id, action) {
            const endpoint = action === 'approve' ? `/api/blog/admin/approve/${id}` : `/api/blog/admin/delete/${id}`;
            const method = action === 'approve' ? 'PATCH' : 'DELETE';
            
            if (!token) return;
            if (action === 'delete' && !confirm('Are you sure you want to permanently delete this article?')) return;

            // Disable buttons during request
            const row = event.target.closest('tr');
            row.style.opacity = '0.5';
            row.querySelectorAll('button').forEach(b => b.disabled = true);

            try {
                const res = await fetch(endpoint, {
                    method: method,
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    fetchBlogs(); // Refresh list
                } else {
                    const data = await res.json();
                    alert(data.error || 'Action failed');
                    row.style.opacity = '1';
                    row.querySelectorAll('button').forEach(b => b.disabled = false);
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
                row.style.opacity = '1';
                row.querySelectorAll('button').forEach(b => b.disabled = false);
            }
        }

        fetchBlogs();
    </script>
</body>
</html>
