<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Desk | GlobalEarn Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-red: #FF0000;
            --pure-green: #00FF00;
            --pure-blue: #0000FF;
            --pure-purple: #9B59B6;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: #050505; border-right: 1px solid var(--border); padding: 40px 20px; flex-shrink: 0; transition: 0.3s; overflow: hidden; }
        .sidebar.collapsed { width: 0; padding: 40px 0; border-right: none; opacity: 0; pointer-events: none; }
        .nav-item { padding: 15px; color: #444; text-decoration: none; display: flex; gap: 12px; font-weight: 700; transition: 0.3s; }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border); }

        /* --- MAIN --- */
        .admin-main { flex-grow: 1; padding: 40px; overflow-y: auto; }

        .support-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        .stat-card h4 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card .val { font-size: 1.8rem; font-weight: 900; }

        /* --- TICKET TABLE --- */
        .ticket-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ticket-table th { text-align: left; padding: 15px; font-size: 0.7rem; color: #444; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .ticket-table td { padding: 20px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .ticket-row:hover { background: rgba(255,255,255,0.02); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .badge-open { background: rgba(0, 255, 0, 0.1); color: var(--pure-green); border: 1px solid var(--pure-green); }
        .badge-pending { background: rgba(155, 89, 182, 0.1); color: var(--pure-purple); border: 1px solid var(--pure-purple); }
        .badge-closed { background: #222; color: #666; }

        .btn-view { background: var(--pure-blue); color: #fff; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 0.7rem; }

        @media (max-width: 1100px) { .sidebar { display: none; } .support-stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
            <div style="font-weight:900; color:var(--pure-red);">GLOBAL_OS</div>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:#444; cursor:pointer; font-size:1.2rem;">❮</button>
        </div>
        <nav>
            <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="admin-users.html" class="nav-item">👥 Users</a>
            <a href="admin-membership.html" class="nav-item">⭐ Tier Manager</a>
            <a href="admin-content.html" class="nav-item">🎬 Content</a>
            <a href="admin-finance.html" class="nav-item">💸 Financials</a>
            <a href="admin-security.html" class="nav-item">🛡️ Security</a>
            <a href="admin-support.html" class="nav-item active">🎧 Support</a>
            <a href="messages.html" class="nav-item">📬 Support Inbox</a>
            <a href="admin-settings.html" class="nav-item">⚙️ Settings</a>
        </nav>
    </aside>

    <main class="admin-main">
        <div style="margin-bottom: 40px; display: flex; align-items: center; gap: 20px;">
            <button onclick="toggleSidebar()" id="openBtn" style="display: none; background:none; border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px; cursor:pointer;">☰</button>
            <h1 style="font-size: 2.2rem; letter-spacing: -1.5px;">Support <span>Ticketing</span></h1>
        </div>

        <div class="support-stats">
            <div class="stat-card">
                <h4>Open Tickets</h4>
                <div id="open-tickets" class="val" style="color: var(--pure-green);">0</div>
            </div>
            <div class="stat-card">
                <h4>Pending 2FA Resets</h4>
                <div id="pending-resets" class="val" style="color: var(--pure-purple);">0</div>
            </div>
            <div class="stat-card">
                <h4>Avg Response Time</h4>
                <div id="avg-response" class="val">0h</div>
            </div>
        </div>

        <div style="background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 30px;">
            <h3 style="margin-bottom: 20px; font-size: 1rem;">Active Support Queue</h3>
            <table class="ticket-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Last Update</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ticket-body"></tbody>
            </table>
        </div>
    </main>

    <script src="admin-support.js"></script>
</body>
</html>
