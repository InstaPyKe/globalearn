<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Desk | Admin Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-red: #FF0000;
            --pure-green: #00FF00;
            --pure-blue: #0000FF;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: #050505; border-right: 1px solid var(--border); padding: 40px 20px; flex-shrink: 0; transition: 0.3s; overflow: hidden; }
        .sidebar.collapsed { width: 0; padding: 40px 0; border-right: none; opacity: 0; pointer-events: none; }
        .nav-item { padding: 15px; color: #444; text-decoration: none; display: flex; gap: 12px; font-weight: 700; transition: 0.3s; }
        .nav-item.active { color: #fff; background: var(--glass); border-radius: 12px; border: 1px solid var(--border); }

        /* --- MAIN CONTENT --- */
        .main-content { flex-grow: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-area { margin-bottom: 40px; }
        .header-area h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; }

        .msg-grid { display: flex; flex-direction: column; gap: 20px; }
        .msg-card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px; 
            padding: 30px; transition: 0.3s; position: relative;
        }
        .msg-card.unread { border-left: 4px solid var(--pure-blue); background: rgba(0, 0, 255, 0.02); }
        .msg-card:hover { border-color: #444; }

        .msg-header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .sender-info { display: flex; flex-direction: column; gap: 4px; }
        .sender-name { font-weight: 800; color: var(--pure-green); font-size: 1.1rem; }
        .sender-email { font-size: 0.75rem; color: #666; font-family: monospace; }
        
        .msg-meta { text-align: right; }
        .timestamp { font-size: 0.7rem; color: #444; font-weight: 700; display: block; }
        .status-badge { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; margin-top: 5px; display: inline-block; }
        .status-pending { background: rgba(0, 0, 255, 0.1); color: var(--pure-blue); }
        .status-read { background: rgba(255, 255, 255, 0.05); color: #666; }

        .msg-subject { font-weight: 700; color: #fff; margin-bottom: 10px; display: block; font-size: 0.95rem; }
        .msg-body { color: #aaa; line-height: 1.6; font-size: 0.9rem; margin-bottom: 25px; white-space: pre-wrap; }

        .actions { display: flex; gap: 10px; }
        .btn { 
            padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        .btn-read { background: var(--pure-blue); color: #fff; }
        .btn-delete { background: transparent; border: 1px solid #333; color: #555; }
        .btn-delete:hover { border-color: var(--pure-red); color: var(--pure-red); }

        @media (max-width: 900px) { .sidebar { display: none; } }
    </style>
</head>
<body id="body">
    <aside class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
            <div style="font-weight:900; color:var(--pure-red);">GLOBAL_OS</div>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:#444; cursor:pointer; font-size:1.2rem;">❮</button>
        </div>
        <nav>
            <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="admin-users.html" class="nav-item">👥 Users</a>
            <a href="admin-membership.html" class="nav-item">⭐ Tier Manager</a>
            <a href="admin-content.html" class="nav-item">🎬 Content</a>
            <a href="admin-finance.html" class="nav-item">💸 Financials</a>
            <a href="admin-security.html" class="nav-item">🛡️ Security</a>
            <a href="admin-support.html" class="nav-item">🎧 Support</a>
            <a href="messages.html" class="nav-item active">📬 Support Inbox</a>
            <a href="admin-settings.html" class="nav-item">⚙️ Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header-area" style="display: flex; align-items: center; gap: 20px;">
            <button onclick="toggleSidebar()" id="openBtn" style="display: none; background:none; border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px; cursor:pointer;">☰</button>
            <div style="flex-grow: 1;">
            <h1>SUPPORT<span>_INBOX</span></h1>
            <p style="color: #444; font-size: 0.85rem; margin-top: 5px;">Manage global user inquiries and technical tickets.</p>
            </div>
        </div>
        
        <div id="messages-list" class="msg-grid">
            <!-- Messages load here -->
            <div style="color: #444; font-weight: 700;">Scanning database for inquiries...</div>
        </div>
    </main>

    <script src="admin-messages.js"></script>
</body>
</html>
