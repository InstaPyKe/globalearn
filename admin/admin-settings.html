<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Settings | Admin Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-blue: #0000FF;
            --pure-red: #FF0000;
            --pure-green: #00FF00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; min-height: 100vh; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: #050505; border-right: 1px solid var(--border); padding: 40px 20px; flex-shrink: 0; transition: 0.3s; overflow: hidden; }
        .sidebar.collapsed { width: 0; padding: 40px 0; border-right: none; opacity: 0; pointer-events: none; }
        .nav-item { padding: 15px; color: #444; text-decoration: none; display: flex; gap: 12px; font-weight: 700; transition: 0.3s; }
        .nav-item.active { color: #fff; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border); }

        /* --- MAIN --- */
        .main-content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; gap: 30px; }

        .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 10px; }
        .header h1 { font-weight: 900; letter-spacing: -2px; font-size: 2.5rem; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .config-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }
        .section-label { font-size: 0.7rem; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 8px; font-weight: 700; }
        
        input { 
            width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; 
            border-radius: 10px; color: var(--pure-green); font-family: monospace; font-size: 1rem;
        }

        .save-btn { 
            grid-column: span 2; background: var(--pure-blue); color: #fff; border: none; 
            padding: 20px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--border); 
            padding: 15px 25px; border-radius: 12px; color: #fff; font-size: 0.8rem; font-weight: 700;
            min-width: 250px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: space-between;
            animation: toastSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .toast.success { border-left: 4px solid var(--pure-green); }
        .toast.error { border-left: 4px solid var(--pure-red); }
        .toast.fade-out { animation: toastFadeOut 0.3s ease-in forwards; }

        @keyframes toastSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastFadeOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(20px); }
        }

        @media (max-width: 1100px) {
            .sidebar { display: none; }
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <aside class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
            <div style="font-weight:900; color:var(--pure-red);">GLOBAL_OS</div>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:#444; cursor:pointer; font-size:1.2rem;">❮</button>
        </div>
        <nav>
            <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="admin-users.html" class="nav-item">👥 Users</a>
            <a href="admin-membership.html" class="nav-item">⭐ Tier Manager</a>
            <a href="admin-content.html" class="nav-item">🎬 Content</a>
            <a href="admin-finance.html" class="nav-item">💸 Financials</a>
            <a href="admin-security.html" class="nav-item">🛡️ Security</a>
            <a href="admin-support.html" class="nav-item">🎧 Support</a>
            <a href="messages.html" class="nav-item">📬 Support Inbox</a>
            <a href="admin-settings.html" class="nav-item active">⚙️ Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header" style="display: flex; align-items: center; gap: 20px;">
            <button onclick="toggleSidebar()" id="openBtn" style="display: none; background:none; border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px; cursor:pointer;">☰</button>
            <h1>SYSTEM<span>_CONFIG</span></h1>
            <p style="color: #444;">Adjust global earning algorithms and platform constraints.</p>
        </header>

        <form class="settings-grid" id="settingsForm">
            <div class="config-card">
                <span class="section-label">Referral Commission (%)</span>
                <div class="input-group">
                    <label>Level 1 (Direct)</label>
                    <input type="number" id="ref_l1" value="10">
                </div>
                <div class="input-group">
                    <label>Level 2 (Indirect)</label>
                    <input type="number" id="ref_l2" value="5">
                </div>
                <div class="input-group">
                    <label>Level 3 (Network)</label>
                    <input type="number" id="ref_l3" value="2">
                </div>
            </div>

            <div class="config-card">
                <span class="section-label">Withdrawal Logic</span>
                <div class="input-group">
                    <label>Minimum Payout (KSH)</label>
                    <input type="number" id="min_payout" value="50.00">
                </div>
                <div class="input-group">
                    <label>Daily Payout Limit</label>
                    <input type="number" id="daily_payout_limit" value="5000">
                </div>
                <div class="input-group">
                    <label>Service Fee (%)</label>
                    <input type="number" id="service_fee" value="1.5">
                </div>
            </div>

            <button type="submit" class="save-btn">Push Updates to Production</button>
        </form>
    </main>

    <script src="admin-settings.js"></script>
</body>
</html>
