<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Lounge | GlobalEarn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-red: #FF0000;
            --pure-green: #00FF00;
            --pure-blue: #0000FF;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(25px); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; transition: transform 0.4s; padding: 30px 20px; display: flex; flex-direction: column; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 50px; text-align: center; letter-spacing: -1px;}
        .logo span { color: var(--pure-green); }
        .nav-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-link { padding: 14px 18px; text-decoration: none; color: #888; border-radius: 12px; font-size: 0.95rem; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--glass); color: #fff; border-color: var(--border); }
        .nav-link.active { border-left: 4px solid var(--pure-blue); }

        /* --- MAIN --- */
        .main-wrapper { flex-grow: 1; margin-left: var(--sidebar-width); transition: margin-left 0.4s; width: 100%; }
        .top-nav { height: 70px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 900; }
        .toggle-btn { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; }

        .content-padding { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .video-container { background: #000; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 40px; position: relative; }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
        
        .video-info { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .video-title { font-size: 1.2rem; font-weight: 800; }
        .reward-badge { background: var(--pure-green); color: #000; padding: 10px 20px; border-radius: 12px; font-weight: 900; font-size: 0.9rem; }

        .timer-overlay { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); font-weight: 700; color: var(--pure-blue); }

        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .task-card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .task-card:hover { border-color: var(--pure-blue); transform: translateY(-5px); }
        .thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 12px; margin-bottom: 15px; }

        @media (max-width: 992px) { .sidebar { transform: translateX(-100%); } .main-wrapper { margin-left: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="logo">GLOBAL<span>EARN</span></div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link"><span>🏠</span> Dashboard</a>
            <a href="earning-hub.html" class="nav-link active"><span>💰</span> Earning Hub</a>
            <a href="blogwritting.html" class="nav-link"><span>✍️</span> Write Blog</a>
            <a href="refferals.html" class="nav-link"><span>👥</span> My Network</a>
            <a href="membership.html" class="nav-link"><span>⭐</span> Membership</a>
            <a href="withdrawals.html" class="nav-link"><span>💳</span> Withdrawals</a>
            <a href="settings.html" class="nav-link"><span>⚙️</span> Settings</a>
        </nav>
        <a href="#" id="logoutBtn" class="nav-link" style="color: var(--pure-red); margin-top: auto;"><span>🚪</span> Logout</a>
    </aside>

    <div class="main-wrapper" id="mainWrapper">
        <header class="top-nav">
            <button class="toggle-btn" id="toggleBtn">☰</button>
            <div style="font-size: 0.85rem; color: #888;">Tasks Available: <span id="task-count" style="color: #fff;">0</span></div>
        </header>

        <main class="content-padding">
            <div class="video-container">
                <div class="timer-overlay" id="timer">00:00</div>
                <div class="video-player">
                    <span style="color: #444; font-weight: 900;">SELECT A TASK BELOW TO START</span>
                </div>
                <div class="video-info">
                    <div>
                        <div class="video-title">No Task Selected</div>
                        <div style="color: #666; font-size: 0.8rem; margin-top: 5px;">Provider: GlobalEarn Network</div>
                    </div>
                    <div class="reward-badge">+ KSH. 0.00</div>
                </div>
            </div>

            <h3 style="margin-bottom: 20px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: #555;">Next Available Tasks</h3>
            <div class="task-grid" id="taskGrid"></div>
        </main>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        const mainWrapper = document.getElementById('mainWrapper');

        toggleBtn.addEventListener('click', () => {
            if (window.innerWidth > 992) {
                sidebar.classList.toggle('collapsed');
                mainWrapper.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('active');
            }
        });

        let activeTaskId = null;
        let activeInterval = null;

        // Helper to format seconds into HH:MM:SS
        function startResetCountdown(elementId, seconds) {
            let remaining = seconds;
            const el = document.getElementById(elementId);
            if (!el) return;
            const timer = setInterval(() => {
                const h = Math.floor(remaining / 3600);
                const m = Math.floor((remaining % 3600) / 60);
                const s = remaining % 60;
                el.innerText = `${h}h ${m}m ${s}s`;
                remaining--;
                if (remaining < 0) { clearInterval(timer); location.reload(); }
            }, 1000);
        }

        async function loadTasks() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '../login.html';
                return;
            }

            try {
                const response = await fetch('/api/tasks/available', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const tasks = await response.json();

                if (tasks.limitReached) {
                    document.getElementById('timer').style.background = "var(--pure-red)";
                    startResetCountdown('timer', tasks.secondsLeft);
                    document.getElementById('taskGrid').innerHTML = `<div style="color:var(--pure-red); text-align:center; grid-column: 1/-1; padding: 40px; background: var(--glass); border-radius: 20px; border: 1px dashed var(--pure-red);">Daily reward limit reached. Next task available in: <span id="grid-timer" style="font-weight:800;"></span></div>`;
                    startResetCountdown('grid-timer', tasks.secondsLeft);
                    return;
                }
                
                const grid = document.getElementById('taskGrid');
                grid.innerHTML = '';
                
                const videoTasks = tasks.filter(t => t.task_type === 'video');
                document.getElementById('task-count').innerText = videoTasks.length;

                videoTasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.onclick = () => selectTask(task);
                    card.innerHTML = `
                        <div class="thumb-placeholder"></div>
                        <div style="font-weight: 700;">${task.title}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                            <span style="color: #888; font-size: 0.75rem;">${task.duration_seconds}s</span>
                            <span style="color: var(--pure-green); font-size: 0.8rem; font-weight: 700;">KSH. ${parseFloat(task.reward).toFixed(2)}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Failed to load tasks", err);
            }
        }

        function selectTask(task) {
            if (activeInterval) clearInterval(activeInterval);
            activeTaskId = task.id;
            document.querySelector('.video-title').innerText = task.title;
            document.querySelector('.reward-badge').innerText = `+ KSH. ${parseFloat(task.reward).toFixed(2)}`;
            
            let embedUrl = task.url;
            try {
                if (embedUrl.includes('youtube.com/watch?v=')) {
                    const videoId = embedUrl.split('v=')[1].split('&')[0];
                    embedUrl = `https://www.youtube.com/embed/${videoId}`;
                } else if (embedUrl.includes('youtu.be/')) {
                    const videoId = embedUrl.split('youtu.be/')[1].split('?')[0];
                    embedUrl = `https://www.youtube.com/embed/${videoId}`;
                }
            } catch (e) {
                console.error("URL Parsing failed", e);
            }
            
            document.querySelector('.video-player').innerHTML = `
                <iframe width="100%" height="100%" src="${embedUrl}?autoplay=1&mute=1&enablejsapi=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            
            startTimer(task.duration_seconds);
        }

        function startTimer(seconds) {
            let timeLeft = seconds;
            const timerDisplay = document.getElementById('timer');
            timerDisplay.style.background = "rgba(0,0,0,0.8)";
            timerDisplay.style.color = "var(--pure-blue)";
            timerDisplay.onclick = null;
            timerDisplay.style.cursor = "default";

            activeInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(activeInterval);
                    const reward = document.querySelector('.reward-badge').innerText;
                    timerDisplay.innerText = `CLAIM ${reward.replace('+', '')}`;
                    timerDisplay.style.background = "var(--pure-green)";
                    timerDisplay.style.color = "#000";
                    timerDisplay.style.cursor = "pointer";
                    timerDisplay.onclick = claimReward;
                }
            }, 1000);
        }

        async function claimReward() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/tasks/complete', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ taskId: activeTaskId })
                });

                const data = await response.json();
                if (response.ok) {
                    alert("Reward claimed!");
                    location.reload();
                } else {
                    if (data.secondsLeft) {
                        document.getElementById('timer').style.background = "var(--pure-red)";
                        startResetCountdown('timer', data.secondsLeft);
                    } else {
                        alert(data.error);
                    }
                }
            } catch (err) {
                console.error("Reward claim error", err);
            }
        }

        window.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
