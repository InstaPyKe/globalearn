<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GlobalEarn Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-green: #00FF00;
            --pure-blue: #0000FF;
            --pure-purple: #9B59B6;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --bg-color: #000000;
            --text-color: #ffffff;
            --nav-bg: rgba(0, 0, 0, 0.8);
        }

        body.light-mode {
            --bg-color: #f8f9fa;
            --text-color: #121212;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --glass: rgba(0, 0, 0, 0.05);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 10% 10%, rgba(0, 255, 0, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(0, 0, 255, 0.05) 0%, transparent 40%); z-index: -1; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 10%; background: var(--nav-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; text-decoration: none; color: var(--text-color); }
        .logo span { color: var(--pure-green); }
        .main-nav-group { display: flex; align-items: center; gap: 25px; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .auth-group { display: flex; align-items: center; gap: 30px; }
        .nav-link-item { color: #888; text-decoration: none; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; position: relative; }
        .nav-link-item:hover, .nav-link-item.active { color: var(--text-color); }
        .nav-link-item::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--pure-green); transition: 0.3s; }
        .nav-link-item:hover::after, .nav-link-item.active::after { width: 100%; }

        /* --- DROPDOWN NAVIGATION --- */
        .dropdown { position: relative; display: flex; align-items: center; }
        .dropdown-content {
            position: absolute;
            top: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 16px;
            min-width: 200px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 1100;
        }
        .dropdown:hover .dropdown-content { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .dropdown-content::before { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 12px; height: 12px; background: rgba(10, 10, 10, 0.95); border-left: 1px solid var(--border); border-top: 1px solid var(--border); }
        
        .dropdown-item {
            padding: 12px 16px;
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .dropdown-item:hover { background: var(--glass); color: var(--text-color); padding-left: 20px; }
        .dropdown-trigger svg { transition: 0.3s; }
        .dropdown:hover .dropdown-trigger svg { transform: rotate(180deg); color: var(--pure-green); }

        .nav-cta { padding: 10px 25px; background: var(--pure-green); color: #000 !important; text-decoration: none; font-weight: 800; border-radius: 8px; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase; }

        .theme-toggle {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Menu */
        .hamburger-btn { display: none; background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 900; }
        body.light-mode .hamburger-btn { color: var(--text-color); }
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--bg-color);
            backdrop-filter: blur(35px);
            z-index: 2000;
            padding: 40px 25px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .mobile-menu-overlay.open { right: 0; }
        .menu-close-btn { background: var(--glass); width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); color: #fff; font-size: 1.2rem; cursor: pointer; align-self: flex-end; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        body.light-mode .menu-close-btn { color: var(--text-color); }
        .menu-close-btn:hover { background: var(--pure-red); border-color: var(--pure-red); transform: rotate(90deg); }

        .tree-container { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; overflow-y: auto; }
        .tree-root { font-size: 0.7rem; font-weight: 800; color: var(--pure-blue); text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 10px; opacity: 0.8; }
        .tree-leaf { 
            color: #ccc; text-decoration: none; font-weight: 600; font-size: 1.05rem; 
            padding: 16px 20px; border-radius: 15px; transition: 0.3s;
            display: flex; align-items: center; gap: 15px; border: 1px solid transparent;
        }
        body.light-mode .tree-leaf { color: #555; }
        .tree-leaf:hover { background: var(--glass); color: var(--text-color); transform: translateX(8px); border-color: var(--border); }
        body.light-mode .tree-leaf:hover { color: var(--pure-blue); }
        .tree-leaf.active { background: rgba(0, 255, 0, 0.05); color: var(--pure-green); border-color: rgba(0, 255, 0, 0.1); }

        /* Centering Wrapper */
        .auth-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .login-card {
            width: 100%; max-width: 380px; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 35px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #555; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--border); padding: 13px 15px; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; font-size: 0.95rem; }
        input:focus { border-color: var(--pure-blue); }

        .login-btn { width: 100%; padding: 14px; background: var(--pure-green); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 5px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3); }

        #message { margin-top: 15px; font-size: 0.85rem; font-weight: 600; }

        .links { margin-top: 20px; font-size: 0.8rem; color: #666; display: flex; flex-direction: column; gap: 8px; }
        .links a { color: #888; text-decoration: none; transition: 0.3s; }
        .links a:hover { color: var(--pure-blue); }

        @media (max-width: 900px) {
            nav { padding: 15px 5%; }
            .main-nav-group, .auth-group { display: none; }
            .hamburger-btn { display: block; }
            .nav-right { gap: 10px; }
            .theme-toggle { padding: 6px 10px; font-size: 1rem; }
            .login-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav>
        <a href="/" class="logo">GLOBAL<span>EARN</span></a>
        <div class="main-nav-group">
            <a href="/" class="nav-link-item">Home</a>
            <a href="/leaderboard" class="nav-link-item">Leaderboard</a>
            <a href="/payments" class="nav-link-item">Payments</a>
            <div class="dropdown">
                <a href="#" class="nav-link-item dropdown-trigger" style="display: flex; align-items: center; gap: 8px;">Resources <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></a>
                <div class="dropdown-content">
                    <a href="/features" class="dropdown-item">Features</a>
                    <a href="/faq" class="dropdown-item">FAQ</a>
                    <a href="/legal" class="dropdown-item">Legal</a>
                    <a href="/contact" class="dropdown-item">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="auth-wrapper">
        <div class="login-card">
            <h2 style="font-size: 1.3rem; margin-bottom: 20px; font-weight: 800;">Welcome Back</h2>
            <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="name@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="07XXXXXXXX" required>
                        <div id="phone-feedback" style="font-size: 0.65rem; margin-top: 5px; font-weight: 600; min-height: 1em; text-align: left;"></div>
                    </div>
                    <!-- <div class="form-group" style="display: flex; justify-content: center;">
                        <div class="g-recaptcha" data-sitekey="6LfN19AsAAAAAKS0PsPvcBPGupdv4NfR_4Zkr3_h"></div>
                    </div> -->
                    <button type="submit" class="login-btn">Secure Login</button>
            </form>
            <div id="message" style="margin-top: 15px; font-size: 0.85rem; font-weight: 600;"></div>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="/register">New here? <span style="color: var(--pure-green); font-weight: 700;">Create Account</span></a>
            </div>
        </div>
    </main>

    <script>
        // Phone validation logic using IP-based regional detection (Synced with Register)
        const phoneInput = document.getElementById('phone');
        const phoneFeedback = document.getElementById('phone-feedback');

        phoneInput.addEventListener('blur', async () => {
            const phoneNumber = phoneInput.value.trim();
            if (!phoneNumber) {
                phoneFeedback.innerText = "";
                return;
            }

            phoneFeedback.style.color = "#888";
            phoneFeedback.innerText = "Verifying regional protocol...";

            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                const callingCode = geoData.country_calling_code; 
                const country = geoData.country_name;

                if (phoneNumber.startsWith(callingCode)) {
                    phoneFeedback.style.color = "var(--pure-red)";
                    phoneFeedback.innerText = `⚠ Please use local format (07...) instead of ${callingCode}.`;
                    return;
                }

                if (!phoneNumber.startsWith('0')) {
                    phoneFeedback.style.color = "var(--pure-red)";
                    phoneFeedback.innerText = `⚠ Format mismatch. Please start with 0 (e.g., 07...).`;
                    return;
                }

                const cleanNumber = phoneNumber.replace(/\D/g, '');
                if (cleanNumber.length !== 10) {
                    phoneFeedback.style.color = "var(--pure-red)";
                    phoneFeedback.innerText = "⚠ Number must be exactly 10 digits.";
                    return;
                }

                const providers = [
                    {
                        name: 'Safaricom',
                        color: '#00FF00',
                        regex: /^(070[0-9]|071[0-9]|072[0-9]|074[0-3,5,6,8]|075[7-9]|076[8,9]|079[0-9]|011[0-5])/
                    },
                    {
                        name: 'Airtel',
                        color: '#FF0000',
                        regex: /^(073[0-9]|075[0-6]|078[0-9]|010[0-2])/
                    },
                    {
                        name: 'Telkom',
                        color: '#00FFFF',
                        regex: /^(077[0-9])/
                    }
                ];

                const match = providers.find(p => p.regex.test(cleanNumber));

                if (match) {
                    phoneFeedback.style.color = match.color;
                    phoneFeedback.innerText = `✓ ${match.name} Network detected (${country})`;
                } else {
                    phoneFeedback.style.color = "var(--pure-red)";
                    phoneFeedback.innerText = "⚠ Invalid or unknown service provider.";
                }
            } catch (err) {
                phoneFeedback.style.color = "#666";
                phoneFeedback.innerText = "Regional verification offline.";
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const captchaToken = "bypass_for_localhost"; // grecaptcha.getResponse();

            // if (!captchaToken) {
            //     messageDiv.style.color = 'var(--pure-red)';
            //     messageDiv.innerText = "Please complete the CAPTCHA.";
            //     return;
            // }

            // Strict 10-digit Kenyan validation
            const cleanPhone = phone.replace(/\D/g, '');
            const validPrefix = /^0[17]/.test(cleanPhone);
            
            if (cleanPhone.length !== 10 || !validPrefix) {
                messageDiv.style.color = 'var(--pure-red)';
                messageDiv.innerText = "Please enter a valid 10-digit Kenyan phone number.";
                return;
            }

            try {
                messageDiv.style.color = '#888';
                messageDiv.innerText = "Requesting secure access...";
                
                // Direct login attempt
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, phone, captchaToken })
                });

                let data;
                let errorMessage = "An unexpected error occurred.";
                
                const contentType = response.headers.get("content-type") || "";
                
                if (contentType.includes("application/json") || response.status === 204) { // 204 No Content
                    try {
                        data = response.status === 204 ? {} : await response.json(); // Handle empty JSON for 204
                    } catch (jsonError) {
                        console.error("Failed to parse JSON response:", jsonError);
                        const rawText = await response.text(); // Get raw text for debugging
                        console.error("Raw response text:", rawText);
                        errorMessage = `Server responded with invalid JSON. Status: ${response.status} ${response.statusText}. Raw: ${rawText.substring(0, 200)}...`;
                        data = { error: errorMessage };
                    }
                } else {
                    const rawText = await response.text();
                    console.error(`Server responded with non-JSON content (Type: ${contentType}). Status: ${response.status} ${response.statusText}. Raw:`, rawText);
                    errorMessage = `Server responded with non-JSON content. Status: ${response.status} ${response.statusText}. Raw: ${rawText.substring(0, 200)}...`;
                    data = { error: errorMessage };
                }
                if (response.ok) {
                    messageDiv.style.color = 'var(--pure-green)';
                    messageDiv.innerText = "Login successful! Redirecting...";
                    localStorage.setItem('token', data.token);
                    setTimeout(() => {
                        window.location.href = '/users/dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.style.color = 'var(--pure-red)';
                    messageDiv.innerText = data.error || `Security error: ${response.status} ${response.statusText}`;
                }
            } catch (err) {
                messageDiv.style.color = 'var(--pure-red)';
                messageDiv.innerText = "Connection error.";
            }
        });
    </script>

    <footer class="global-footer">
        <div class="footer-wrap">
            <div class="footer-logo">GE<span>L</span></div>
            <div style="font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; text-align: center; margin-top: 10px;">
                Developed by: <span style="color: #666;">JASPER-BREVIN TECHNOLOGIES</span>
            </div>
        </div>
    </footer>
    <style>
        .global-footer { margin-top: 100px; padding: 60px 20px; background: #000; border-top: 1px solid var(--border); position: relative; }
        .global-footer::before { content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 150px; height: 1px; background: linear-gradient(90deg, transparent, var(--pure-green), transparent); }
        .footer-wrap { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .footer-logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }
        .footer-logo span { color: var(--pure-green); }
        .footer-copyright { font-size: 0.7rem; color: #444; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; text-align: center; }
        .footer-copyright span { color: #666; }
    </style>
</body>
</html>
