<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | GlobalEarn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-green: #00FF00;
            --pure-blue: #0000FF;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        .bg-glow { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 0, 0.05) 0%, transparent 50%); 
            z-index: -1; 
        }

        .error-card {
            width: 100%;
            max-width: 450px;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 50px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 5rem; 
            font-weight: 900; 
            background: linear-gradient(to right, var(--pure-green), var(--pure-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1; 
            margin-bottom: 10px; 
            animation: pulse 3s infinite ease-in-out;
        }
        h2 { font-size: 1.5rem; margin-bottom: 20px; letter-spacing: -0.5px; }
        p { color: #888; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.6; }

        .home-btn {
            display: inline-block;
            padding: 14px 30px;
            background: var(--pure-green);
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .home-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="error-card">
        <h1>404</h1>
        <h2>Lost in the Vault?</h2>
        <p>The protocol path you requested does not exist or has been moved to a secure sector. Please re-verify your coordinates.</p>
        <a href="/" class="home-btn">Return to Base</a>
    </div>
</body>
</html>
